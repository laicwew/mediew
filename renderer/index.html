<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' file: data:; media-src 'self' file:; style-src 'self' 'unsafe-inline';">
  <title>Mediew</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titlebar">
    <span id="app-title">Mediew</span>
    <div id="titlebar-right">
      <button id="btn-theme" title="切换主题">
        <svg class="icon-sun" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.42 0-.39.39-.39 1.03 0 1.42l1.06 1.06c.39.39 1.03.39 1.42 0 .39-.39.39-1.03 0-1.42L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.42 0-.39.39-.39 1.03 0 1.42l1.06 1.06c.39.39 1.03.39 1.42 0 .39-.39.39-1.03 0-1.42l-1.06-1.06zm1.06-10.96c.39-.39.39-1.03 0-1.42-.39-.39-1.03-.39-1.42 0l-1.06 1.06c-.39.39-.39 1.03 0 1.42.39.39 1.03.39 1.42 0l1.06-1.06zM7.05 18.36c.39-.39.39-1.03 0-1.42-.39-.39-1.03-.39-1.42 0l-1.06 1.06c-.39.39-.39 1.03 0 1.42.39.39 1.03.39 1.42 0l1.06-1.06z"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor" style="display:none;">
          <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/>
        </svg>
      </button>
      <button id="btn-settings" title="设置">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
          <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
        </svg>
      </button>
      <div id="window-controls">
        <button id="btn-minimize" title="最小化">─</button>
        <button id="btn-maximize" title="最大化">□</button>
        <button id="btn-close" title="关闭">✕</button>
      </div>
    </div>
  </div>

  <div id="directory-bar">
    <svg class="folder-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
      <path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
    </svg>
    <span id="directory-path">选择目录...</span>
    <svg class="arrow-icon" viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
      <path d="M7 10l5 5 5-5z"/>
    </svg>
  </div>

  <div id="main-content">
    <aside id="folder-tree">
      <div id="folder-list"></div>
    </aside>
    <main id="image-grid-container">
      <div id="welcome-screen">
        <div class="welcome-icon">
          <svg viewBox="0 0 24 24" width="64" height="64" fill="currentColor">
            <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
          </svg>
        </div>
        <h2>选择一个文件夹</h2>
        <p>点击上方的目录选择器来浏览图片和视频</p>
      </div>
      <div id="image-grid"></div>
    </main>
  </div>

  <div id="preview-modal">
    <div class="preview-backdrop"></div>
    <div class="preview-content">
      <div class="preview-image-area">
        <button class="preview-close" title="关闭">✕</button>
        <button class="preview-nav preview-prev" title="上一张 (←)">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
          </svg>
        </button>
        <div class="preview-image-container">
          <img id="preview-image" src="" alt="">
          <video id="preview-video" style="display: none;"></video>
          <div id="video-controls" class="video-controls">
            <button id="video-play" class="video-play-btn" title="播放/暂停">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
              </svg>
            </button>
            <div id="video-progress-container" class="video-progress-container">
              <div id="video-progress" class="video-progress">
                <div id="video-progress-thumb" class="video-progress-thumb"></div>
              </div>
            </div>
            <span id="video-time" class="video-time">0:00 / 0:00</span>
            <button id="video-volume-btn" class="video-volume-btn" title="静音">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
              </svg>
            </button>
            <input id="video-volume-slider" type="range" class="video-volume-slider" min="0" max="1" step="0.1" value="1">
          </div>
        </div>
        <button class="preview-nav preview-next" title="下一张 (→)">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
          </svg>
        </button>
        <div class="preview-counter"></div>
      </div>
      <div class="preview-info-panel">
        <div class="info-header">
          <span class="info-title">图片信息</span>
        </div>
        <div class="info-body">
          <div class="info-row">
            <span class="info-label">文件名</span>
            <span class="info-value" id="info-filename">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">尺寸</span>
            <span class="info-value" id="info-dimensions">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">大小</span>
            <span class="info-value" id="info-filesize">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">日期</span>
            <span class="info-value" id="info-date">-</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="settings-modal">
    <div class="settings-backdrop"></div>
    <div class="settings-panel">
      <div class="settings-header">
        <h3>设置</h3>
        <button class="settings-close" title="关闭">✕</button>
      </div>
      <div class="settings-body">
        <div class="settings-section">
          <div class="settings-label">排序方式</div>
          <div class="sort-options">
            <button class="sort-option active" data-sort="mtime">按修改时间</button>
            <button class="sort-option" data-sort="filename">按文件名</button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">排序方向</div>
          <div class="sort-options">
            <button class="sort-dir-option active" data-dir="desc">降序 (新→旧 / Z→A)</button>
            <button class="sort-dir-option" data-dir="asc">升序 (旧→新 / A→Z)</button>
          </div>
        </div>
        <div class="settings-section" id="group-section">
          <div class="settings-label">分组方式</div>
          <div class="sort-options">
            <button class="group-option" data-group="year">年</button>
            <button class="group-option" data-group="month">月</button>
            <button class="group-option active" data-group="day">日</button>
            <button class="group-option" data-group="hour">时</button>
          </div>
        </div>
        <div class="settings-section" id="layout-section">
          <div class="settings-label">图片呈现模式</div>
          <div class="layout-options">
            <button class="layout-option active" data-mode="waterfall">
              <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                <rect x="2" y="2" width="8" height="10" rx="1"/>
                <rect x="12" y="2" width="10" height="6" rx="1"/>
                <rect x="2" y="14" width="6" height="8" rx="1"/>
                <rect x="10" y="10" width="12" height="12" rx="1"/>
              </svg>
              <span>混合布局</span>
            </button>
            <button class="layout-option" data-mode="grid">
              <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
                <rect x="2" y="2" width="9" height="9" rx="1"/>
                <rect x="13" y="2" width="9" height="9" rx="1"/>
                <rect x="2" y="13" width="9" height="9" rx="1"/>
                <rect x="13" y="13" width="9" height="9" rx="1"/>
              </svg>
              <span>网格布局</span>
            </button>
          </div>
        </div>
        <div class="settings-section">
          <div class="settings-label">启动行为</div>
          <div class="toggle-row">
            <span>记住上次打开的目录</span>
            <label class="toggle-switch">
              <input type="checkbox" id="setting-remember-dir" checked>
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="context-menu" class="context-menu hidden">
    <div class="context-menu-item" data-action="rename">重命名</div>
    <div class="context-menu-item" data-action="delete">删除</div>
  </div>

  <div id="folder-context-menu" class="context-menu hidden">
    <div class="context-menu-item" data-action="new-folder">新建文件夹</div>
    <div class="context-menu-item" data-action="rename">重命名</div>
    <div class="context-menu-item" data-action="delete">删除文件夹</div>
  </div>

  <script src="utils/date-formatter.js"></script>
  <script src="components/titlebar.js"></script>
  <script src="components/folder-tree.js"></script>
  <script src="components/waterfall.js"></script>
  <script src="components/preview.js"></script>
  <script src="components/context-menu.js"></script>
  <script src="app.js"></script>
</body>
</html>
